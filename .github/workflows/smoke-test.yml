name: Template Smoke Test

on:
  push:
    branches: [ main ]
    paths:
      - '.ai/scripts/**'
      - '.devcontainer/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tectonic
        uses: wtfjoke/setup-tectonic@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run bootstrap (no brain, no rag)
        run: |
          chmod +x ./.ai/scripts/bootstrap.sh
          bash ./.ai/scripts/bootstrap.sh --name "Smoke_Test" --rag none --brain none

      - name: Verify bootstrap output
        run: |
          grep -q "Smoke_Test" STATE.md
          grep -q "Smoke_Test" .ai/config/project.yaml
          test -d docs
          test -d src
          test -d dist
          test -d data/sources
          test -f .ai/.bootstrapped

      - name: Compile minimal LaTeX
        run: |
          echo '\documentclass{article}\begin{document}Hello from LiteRealm.\end{document}' > docs/test.tex
          tectonic -X compile docs/test.tex
          test -f docs/test.pdf
